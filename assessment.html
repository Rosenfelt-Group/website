<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Quiz — Rosably</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" integrity="sha384-ezQ6HS3FLspd9te19o2McUV6FAK091+GG7KO54f/R8DKgCDi7fULhapNrd5LY+vG" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1A1A1A; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #F6F1EB; }
  #root { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  button { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  a { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  input, textarea { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }

  /* Remove Kadence/WordPress content padding for full-bleed dark background */
  .entry-content, .entry-content > *, .wp-block-group,
  .content-container, .content-container > *,
  .site-content, .wp-site-blocks {
    padding-left: 0 !important;
    padding-right: 0 !important;
    max-width: 100% !important;
  }
  .entry-content { padding-top: 0 !important; padding-bottom: 0 !important; }
  .wp-block-html { margin: 0 !important; }
  .entry-header, .entry-title, .page-header { display: none !important; }

  @keyframes rosably-spin { to { transform: rotate(360deg); } }
  @keyframes rosably-pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  .rosably-cta-row { display: flex; gap: 12px; flex-direction: column; }
  @media (min-width: 560px) { .rosably-cta-row { flex-direction: row; } .rosably-cta-row > * { flex: 1; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const ACCENT = "#C05621";
const BG = "#1A1A1A";
const CARD = "#2A2A2C";
const BORDER = "#3D3D3F";
const TEXT = "#F6F1EB";
const MUTED = "#ABABAB";

const QUESTIONS = [
  {
    key: "q1", type: "single",
    title: "What type of organization are you?",
    options: ["Nonprofit", "Accounting Firm", "Law Firm", "Other Professional Services", "Other"],
  },
  {
    key: "q2", type: "single",
    title: "Where is your organization with AI today?",
    options: [
      "We're not using AI tools yet",
      "We've tried a few things but nothing has really stuck",
      "We're using AI tools but not getting as much value as we'd like",
      "We're using AI actively and want to go further",
    ],
  },
  {
    key: "q3", type: "multi", max: 3,
    title: "Where does your team spend the most time on repetitive or manual work?",
    subtitle: "Pick up to 3",
    options: [
      "Email and communications",
      "Document creation and editing",
      "Reporting and data entry",
      "Client or donor follow-up",
      "Scheduling and coordination",
      "Compliance and recordkeeping",
      "Other",
    ],
  },
  {
    key: "q4", type: "single",
    title: "What's the biggest thing holding you back from doing more with AI?",
    options: [
      "We don't know where to start",
      "We've tried things and they didn't stick",
      "We don't have the budget",
      "We don't have the time or staff capacity",
      "We're not sure it applies to our work",
      "Data privacy or compliance concerns",
    ],
  },
  {
    key: "q5", type: "text",
    title: "What would success look like for your organization 90 days from now?",
    placeholder: "One sentence is fine — be specific",
  },
];

const styles = {
  shell: { maxWidth: 680, width: "100%" },
  card: { background: CARD, borderRadius: 16, padding: "32px 28px", border: `1px solid ${BORDER}` },
  h1: { fontSize: "clamp(1.5rem,3.5vw,2rem)", fontWeight: 700, lineHeight: 1.25, margin: 0, color: TEXT },
  qtitle: { fontSize: "1.3rem", fontWeight: 700, lineHeight: 1.35, margin: "0 0 4px", color: TEXT },
  sub: { fontSize: "0.9rem", color: MUTED, margin: "0 0 22px" },
  option: (active) => ({
    display: "flex", alignItems: "center", gap: 14, padding: "15px 16px", borderRadius: 10,
    background: active ? "rgba(192,86,33,0.14)" : BG,
    border: active ? `1px solid ${ACCENT}` : `1px solid ${BORDER}`,
    color: active ? TEXT : "#E8E6E0", cursor: "pointer", textAlign: "left", width: "100%",
    marginBottom: 10, fontSize: "0.95rem", lineHeight: 1.5, transition: "background 0.15s,border 0.15s",
  }),
  dot: (active, multi) => ({
    minWidth: 22, height: 22, borderRadius: multi ? 6 : "50%",
    border: active ? `2px solid ${ACCENT}` : "2px solid #555",
    background: active ? ACCENT : "transparent",
    display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
  }),
  input: {
    width: "100%", padding: "13px 14px", borderRadius: 8, border: `1px solid #444`,
    background: BG, color: TEXT, fontSize: "0.95rem", marginBottom: 14, display: "block",
  },
  primary: (busy) => ({
    width: "100%", padding: "14px", borderRadius: 8, background: ACCENT, border: "none",
    color: TEXT, fontSize: "1rem", fontWeight: 600, cursor: busy ? "wait" : "pointer",
  }),
  ghost: {
    display: "block", textAlign: "center", padding: "14px", borderRadius: 8,
    background: "transparent", border: `1px solid ${ACCENT}`, color: ACCENT,
    fontSize: "1rem", fontWeight: 600, cursor: "pointer", textDecoration: "none",
  },
  nav: { display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 20 },
  back: { padding: "12px 20px", borderRadius: 8, border: "1px solid #444", background: "transparent", color: MUTED, cursor: "pointer", fontSize: "0.9rem" },
  next: (ok) => ({ padding: "12px 28px", borderRadius: 8, background: ok ? ACCENT : "#3a3a3a", border: "none", color: ok ? TEXT : "#777", cursor: ok ? "pointer" : "not-allowed", fontSize: "0.9rem", fontWeight: 600 }),
};

function Logo() {
  return (
    <div style={{ marginBottom: 18 }}>
      <img src="https://rosably.com/wp-content/uploads/2021/02/site-logo-white.svg" alt="Rosably" style={{ height: 28, width: "auto" }} />
    </div>
  );
}

// --- snapshot text rendering: **bold**, "- " bullets, paragraph breaks ---
function renderInline(text, kp) {
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p, i) => {
    if (p.startsWith("**") && p.endsWith("**")) {
      return <strong key={kp + "_" + i} style={{ color: TEXT }}>{p.slice(2, -2)}</strong>;
    }
    return <React.Fragment key={kp + "_" + i}>{p}</React.Fragment>;
  });
}

function renderSnapshot(text) {
  const lines = text.replace(/\r/g, "").split("\n");
  const blocks = [];
  let bullets = [];
  const flush = () => {
    if (bullets.length) {
      blocks.push(
        <ul key={"ul" + blocks.length} style={{ margin: "0 0 16px", paddingLeft: 22 }}>
          {bullets.map((b, i) => (
            <li key={i} style={{ margin: "0 0 8px", lineHeight: 1.6, color: "#E8E6E0" }}>{renderInline(b, "li" + blocks.length + "_" + i)}</li>
          ))}
        </ul>
      );
      bullets = [];
    }
  };
  lines.forEach((raw, idx) => {
    const line = raw.trim();
    if (!line) { flush(); return; }
    if (line.startsWith("- ") || line.startsWith("* ")) {
      bullets.push(line.slice(2).trim());
      return;
    }
    flush();
    const isHeader = /^\*\*[^*]+\*\*$/.test(line);
    if (isHeader) {
      blocks.push(
        <h3 key={"h" + idx} style={{ fontSize: "1.05rem", fontWeight: 700, color: TEXT, margin: "22px 0 10px" }}>
          {line.slice(2, -2)}
        </h3>
      );
    } else {
      blocks.push(
        <p key={"p" + idx} style={{ margin: "0 0 16px", lineHeight: 1.7, color: "#E8E6E0" }}>{renderInline(line, "p" + idx)}</p>
      );
    }
  });
  flush();
  return blocks;
}

function App() {
  const [view, setView] = React.useState("quiz"); // quiz | gate | loading | results | error
  const [qi, setQi] = React.useState(0);
  const [answers, setAnswers] = React.useState({ q1: "", q2: "", q3: [], q4: "", q5: "" });

  const [firstName, setFirstName] = React.useState("");
  const [email, setEmail] = React.useState("");
  const [orgName, setOrgName] = React.useState("");
  const [gateErr, setGateErr] = React.useState("");

  const [snapshot, setSnapshot] = React.useState("");
  const [leadId, setLeadId] = React.useState(null);
  const [saveToken, setSaveToken] = React.useState(null);
  const [submitWarn, setSubmitWarn] = React.useState(false);
  const snapshotSaved = React.useRef(false);
  const [checkoutBusy, setCheckoutBusy] = React.useState(false);
  const [checkoutErr, setCheckoutErr] = React.useState("");

  const q = QUESTIONS[qi];

  const isAnswered = () => {
    const v = answers[q.key];
    if (q.type === "multi") return v.length > 0;
    if (q.type === "text") return v.trim().length > 0;
    return !!v;
  };

  const pickSingle = (opt) => setAnswers(p => ({ ...p, [q.key]: opt }));
  const toggleMulti = (opt) => setAnswers(p => {
    const cur = p[q.key];
    if (cur.includes(opt)) return { ...p, [q.key]: cur.filter(o => o !== opt) };
    if (cur.length >= q.max) return p;
    return { ...p, [q.key]: [...cur, opt] };
  });

  const goNext = () => {
    if (!isAnswered()) return;
    if (qi < QUESTIONS.length - 1) setQi(qi + 1);
    else setView("gate");
  };
  const goBack = () => { if (qi > 0) setQi(qi - 1); };

  const emailValid = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

  const submitGate = () => {
    if (!firstName.trim() || !email.trim() || !orgName.trim()) {
      setGateErr("Please fill in all three fields."); return;
    }
    if (!emailValid(email.trim())) { setGateErr("Please enter a valid work email."); return; }
    setGateErr("");
    setView("loading");
  };

  React.useEffect(() => {
    if (view !== "loading") return;
    let cancelled = false;
    const payload = {
      org_type: answers.q1, ai_stage: answers.q2, pain_points: answers.q3,
      blocker: answers.q4, success_vision: answers.q5.trim(),
    };
    // (a) lead capture + alert — check response; failure is non-blocking but surfaced
    fetch("/wp-json/rosably/v1/submit-assessment", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: firstName.trim(), email: email.trim(), org: orgName.trim(), ...payload }),
    })
      .then(r => r.json())
      .then(d => {
        if (!d || (!d.success && d.status !== 207)) { if (!cancelled) setSubmitWarn(true); return; }
        if (d.lead_id) setLeadId(d.lead_id);
        if (d.save_token) setSaveToken(d.save_token);
      })
      .catch(() => { if (!cancelled) setSubmitWarn(true); });
    // (b) the snapshot — we wait on this
    fetch("/wp-json/rosably/v1/generate-snapshot", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ org_name: orgName.trim(), ...payload }),
    })
      .then(r => r.json())
      .then(d => {
        if (cancelled) return;
        if (d && d.snapshot) { setSnapshot(d.snapshot); setView("results"); }
        else setView("error");
      })
      .catch(() => { if (!cancelled) setView("error"); });
    return () => { cancelled = true; };
  }, [view]);

  // Once results are shown, persist the snapshot and send the confirmation email.
  // snapshotSaved ref prevents double-firing if React re-renders.
  React.useEffect(() => {
    if (view !== "results" || !snapshot || snapshotSaved.current) return;
    snapshotSaved.current = true;
    fetch("/wp-json/rosably/v1/save-snapshot", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        lead_id: leadId,
        save_token: saveToken,
        snapshot,
        email: email.trim(),
        name: firstName.trim(),
        org: orgName.trim(),
      }),
    }).catch(() => {});
  }, [view, snapshot]);

  const buyNow = async () => {
    setCheckoutBusy(true); setCheckoutErr("");
    try {
      const r = await fetch("/wp-json/rosably/v1/create-checkout", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ org_name: orgName.trim(), email: email.trim() }),
      });
      const d = await r.json();
      if (d && d.url) { window.location.href = d.url; return; }
      setCheckoutErr("Something went wrong — email brian@rosably.com to get started");
    } catch (e) {
      setCheckoutErr("Something went wrong — email brian@rosably.com to get started");
    }
    setCheckoutBusy(false);
  };

  // ---------- LOADING ----------
  if (view === "loading") {
    return (
      <div style={styles.shell}>
        <Logo />
        <div style={{ ...styles.card, textAlign: "center", padding: "56px 28px" }}>
          <div style={{ width: 44, height: 44, border: `3px solid ${BORDER}`, borderTopColor: ACCENT, borderRadius: "50%", margin: "0 auto 22px", animation: "rosably-spin 0.9s linear infinite" }} />
          <p style={{ fontSize: "1.05rem", color: TEXT, animation: "rosably-pulse 1.4s ease-in-out infinite" }}>Analyzing your answers…</p>
          <p style={{ fontSize: "0.85rem", color: MUTED, marginTop: 8 }}>Building your personalized AI snapshot</p>
        </div>
      </div>
    );
  }

  // ---------- ERROR / FALLBACK ----------
  if (view === "error") {
    return (
      <div style={styles.shell}>
        <Logo />
        <div style={styles.card}>
          <h2 style={styles.qtitle}>We hit a snag generating your snapshot.</h2>
          <p style={{ fontSize: "0.95rem", color: MUTED, lineHeight: 1.65, margin: "8px 0 24px" }}>
            We've captured your answers and Brian will send your results personally within one business day.
          </p>
          <a href="https://rosably.com/contact/" style={styles.ghost}>Get in touch →</a>
        </div>
      </div>
    );
  }

  // ---------- RESULTS ----------
  if (view === "results") {
    const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    return (
      <div style={styles.shell}>
        <Logo />
        <div style={styles.card}>
          <h1 style={{ ...styles.h1, color: ACCENT }}>Your AI Snapshot — {orgName.trim()}</h1>
          <p style={{ fontSize: "0.9rem", color: MUTED, margin: "6px 0 18px" }}>{answers.q1} · Generated {today}</p>
          <hr style={{ border: "none", borderTop: `2px solid ${ACCENT}`, margin: "0 0 22px" }} />

          <div>{renderSnapshot(snapshot)}</div>

          <hr style={{ border: "none", borderTop: `1px solid ${BORDER}`, margin: "26px 0" }} />

          <h3 style={{ fontSize: "1.15rem", fontWeight: 700, color: TEXT, margin: "0 0 8px" }}>Ready to go deeper?</h3>
          <p style={{ fontSize: "0.95rem", color: MUTED, lineHeight: 1.65, margin: "0 0 22px" }}>
            Your AI Opportunity Review includes a full assessment, detailed findings report, and a prioritized roadmap — built specifically for {orgName.trim()}.
          </p>

          {submitWarn && (
            <p style={{ fontSize: "0.85rem", color: MUTED, margin: "0 0 14px", padding: "10px 14px", background: "#2A2A2C", borderRadius: 6, borderLeft: `3px solid ${ACCENT}` }}>
              We had a hiccup saving your info — Brian will follow up manually within one business day.
            </p>
          )}

          {checkoutErr && <p style={{ color: "#E07A5F", fontSize: "0.9rem", margin: "0 0 12px" }}>{checkoutErr}</p>}

          <div className="rosably-cta-row">
            <button onClick={buyNow} disabled={checkoutBusy} style={styles.primary(checkoutBusy)}>
              {checkoutBusy ? "Starting checkout…" : "Get your AI Opportunity Review — $750"}
            </button>
            <a href="https://rosably.com/contact/" style={styles.ghost}>Book a free discovery call first</a>
          </div>
        </div>
      </div>
    );
  }

  // ---------- GATE ----------
  if (view === "gate") {
    return (
      <div style={styles.shell}>
        <Logo />
        <div style={styles.card}>
          <h2 style={styles.qtitle}>See your personalized AI snapshot</h2>
          <p style={styles.sub}>Takes 15 seconds to generate. No spam, ever.</p>
          <input style={styles.input} type="text" placeholder="First name" value={firstName} onChange={e => setFirstName(e.target.value)} />
          <input style={styles.input} type="email" placeholder="Work email" value={email} onChange={e => setEmail(e.target.value)} />
          <input style={styles.input} type="text" placeholder="Organization name" value={orgName}
            onChange={e => setOrgName(e.target.value)} onKeyDown={e => e.key === "Enter" && submitGate()} />
          {gateErr && <p style={{ color: "#E07A5F", fontSize: "0.88rem", margin: "0 0 14px" }}>{gateErr}</p>}
          <button onClick={submitGate} style={styles.primary(false)}>Generate my snapshot →</button>
          <button onClick={() => setView("quiz")} style={{ ...styles.back, width: "100%", marginTop: 12 }}>← Back</button>
        </div>
      </div>
    );
  }

  // ---------- QUIZ ----------
  const answered = isAnswered();
  const pct = Math.round(((qi + (answered ? 1 : 0)) / QUESTIONS.length) * 100);
  return (
    <div style={styles.shell}>
      <Logo />
      <div style={{ marginBottom: 22 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <span style={{ fontSize: 13, color: MUTED }}>Question {qi + 1} of {QUESTIONS.length}</span>
        </div>
        <div style={{ height: 6, background: "#3A3A3C", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: ACCENT, borderRadius: 3, transition: "width 0.35s ease" }} />
        </div>
      </div>

      <div style={styles.card}>
        <h2 style={styles.qtitle}>{q.title}</h2>
        <p style={styles.sub}>{q.type === "multi" ? q.subtitle : " "}</p>

        {q.type === "text" ? (
          <textarea
            rows={3} placeholder={q.placeholder} value={answers.q5}
            onChange={e => setAnswers(p => ({ ...p, q5: e.target.value }))}
            style={{ ...styles.input, resize: "vertical", minHeight: 90, lineHeight: 1.5 }}
          />
        ) : (
          q.options.map((opt) => {
            const active = q.type === "multi" ? answers[q.key].includes(opt) : answers[q.key] === opt;
            const onClick = () => q.type === "multi" ? toggleMulti(opt) : pickSingle(opt);
            return (
              <button key={opt} onClick={onClick} style={styles.option(active)}>
                <div style={styles.dot(active, q.type === "multi")}>{active && <span style={{ color: "#fff", fontSize: 13, fontWeight: "bold" }}>✓</span>}</div>
                <span>{opt}</span>
              </button>
            );
          })
        )}
      </div>

      <div style={styles.nav}>
        {qi > 0
          ? <button onClick={goBack} style={styles.back}>← Back</button>
          : <span />}
        <button onClick={goNext} disabled={!answered} style={styles.next(answered)}>
          {qi === QUESTIONS.length - 1 ? "Continue →" : "Next →"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
